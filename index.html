<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danylo Melnyk | Frontend Developer</title>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <nav class="nav">
          <a class="logo" href="./">iDM</a>

          <ul class="navigation-list">
            <li class="navigation-list__item">
              <a class="navigation-list__link" href="#">Головна</a>
            </li>
            <li class="navigation-list__item">
              <a class="navigation-list__link" href="#">Послуги</a>
            </li>
            <li class="navigation-list__item">
              <a class="navigation-list__link" href="#">Проєкти</a>
            </li>
            <li class="navigation-list__item">
              <a class="navigation-list__link" href="#">Відгуки</a>
            </li>
            <li class="navigation-list__item">
              <a class="navigation-list__link" href="#">Контакти</a>
            </li>
          </ul>

          <div class="theme-toggle">
            <input
              class="theme-toggle__input"
              type="checkbox"
              name=""
              id="theme-toggle"
              aria-label="Перемкнути тему"
            />
            <label class="theme-switcher" for="theme-toggle">
              <svg
                class="theme-switcher__icon theme-switcher__icon_light"
                width="20"
                height="20"
              >
                <use href="./src/assets/sprite.svg#icon-sun"></use>
              </svg>

              <svg
                class="theme-switcher__icon theme-switcher__icon_dark"
                width="20"
                height="20"
              >
                <use href="./src/assets/sprite.svg#icon-moon"></use>
              </svg>
            </label>
          </div>

          <button
            class="menu-toggle"
            type="button"
            aria-label="Відкрити меню"
            aria-expanded="false"
          >
            <svg class="menu-toggle__icon" width="24" height="20">
              <use href="./src/assets/sprite.svg#icon-menu"></use>
            </svg>
          </button>
        </nav>
      </div>
    </header>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
